<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地理可视化 Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #fff; font-family: -apple-system, sans-serif; }
    #app { display: flex; height: 100vh; }
    #chat { 
      width: 400px; 
      background: #111122; 
      display: flex; 
      flex-direction: column;
      border-right: 1px solid #333;
    }
    #chat-header { 
      padding: 16px; 
      border-bottom: 1px solid #333;
      font-size: 16px;
      color: #4da6ff;
    }
    #chat-messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 16px;
    }
    .msg { 
      margin: 8px 0; 
      padding: 10px 14px; 
      border-radius: 8px; 
      font-size: 13px; 
      line-height: 1.6;
      max-width: 90%;
    }
    .msg.user { 
      background: #1a3a5c; 
      margin-left: auto;
      border-bottom-right-radius: 2px;
    }
    .msg.ai { 
      background: #1a1a2e; 
      border: 1px solid #333;
      border-bottom-left-radius: 2px;
    }
    .msg pre { 
      background: #0d0d1a; 
      padding: 8px; 
      border-radius: 4px; 
      overflow-x: auto;
      font-size: 11px;
      margin-top: 8px;
    }
    #chat-input {
      padding: 12px 16px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
    }
    #chat-input input {
      flex: 1;
      padding: 10px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }
    #chat-input button {
      padding: 10px 16px;
      background: #4da6ff;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    #viz-container { flex: 1; position: relative; }
    .viz-label {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #4da6ff;
    }
    .error-msg { color: #e74c3c; font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat">
      <div id="chat-header">🌍 地理可视化 Agent</div>
      <div id="chat-messages"></div>
      <div id="chat-input">
        <input type="text" id="input" placeholder="输入地理题目..." />
        <button id="send">发送</button>
      </div>
    </div>
    <div id="viz-container">
      <div class="viz-label">Three.js 可视化</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  
  <script type="module">
    import { SceneManager, Globe, COMPONENT_REGISTRY } from '../index.js';
    
    let scene = null;
    const messages = document.getElementById('chat-messages');
    const input = document.getElementById('input');
    
    // 初始化 Three.js 场景
    function initScene() {
      const container = document.getElementById('viz-container');
      scene = new SceneManager(container, { backgroundColor: 0x000011 });
      const globe = new Globe();
      scene.addComponent(globe, {});
      scene.start();
    }
    
    // 添加消息到聊天
    function addMessage(text, type = 'ai') {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
    
    // 解析并渲染 VIZ_JSON
    function parseAndRender(text) {
      const match = text.match(/\[\[VIZ_JSON\]\]([\s\S]*?)\[\[\/VIZ_JSON\]\]/);
      if (!match) return false;
      
      try {
        const data = JSON.parse(match[1]);
        if (data.components) {
          // 清除旧组件
          for (const [id, comp] of [...scene.components]) {
            if (comp.metadata.id !== 'globe') {
              scene.removeComponent(id);
            }
          }
          
          // 加载新组件
          const loaded = scene.loadComponents(data.components, COMPONENT_REGISTRY);
          
          // 显示分析信息
          if (data.analysis) {
            addMessage(`📊 分析：${data.analysis.type} | 要素：${data.analysis.core_elements.join('、')}`);
          }
          addMessage(`✅ 已加载 ${loaded.length} 个可视化组件`);
          
          // 更新可视化标签
          document.querySelector('.viz-label').textContent = 
            data.analysis?.core_elements?.join(' + ') || 'Three.js 可视化';
          
          return true;
        }
      } catch (e) {
        addMessage(`❌ JSON 解析失败: ${e.message}`, 'error-msg');
      }
      return false;
    }
    
    // API 配置
    const API_BASE = window.location.origin;
    
    // 调用 OpenClaw API
    async function callAI(question) {
      const systemPrompt = `你是地理可视化助手。用户提出地理题目后，分析题目并输出可视化指令。

输出格式（必须严格遵守）：
[[VIZ_JSON]]{"analysis":{"type":"题型","core_elements":["要素1","要素2"]},"components":[{"id":"组件ID","params":{}}]}[[/VIZ_JSON]]

然后输出教师讲解。

组件参数格式（必须严格遵守）：

1. ocean_current - 洋流
   {"id":"ocean_current","params":{"path":[[lng1,lat1],[lng2,lat2],...],"type":"cold|warm","label":"名称"}}
   path 是经纬度坐标数组，至少2个点

2. climate_zone - 气候带
   {"id":"climate_zone","params":{"lat":纬度,"lng":经度,"type":"arid|tropical_monsoon|humid_subtropical|temperate_oceanic|tundra","radius":10}}

3. wind - 风向（必须提供path数组）
   {"id":"wind","params":{"path":[[lng1,lat1],[lng2,lat2],...],"strength":5}}
   path 是风的路径坐标，至少2个点

4. terrain - 地形
   {"id":"terrain","params":{"lat":纬度,"lng":经度,"type":"mountain|plain|plateau","radius":10}}

5. plate_tectonic - 板块边界
   {"id":"plate_tectonic","params":{"boundary":[[lng1,lat1],[lng2,lat2],...],"type":"convergent|divergent","plates":["板块1","板块2"]}}

6. arrow - 因果箭头
   {"id":"arrow","params":{"from":[lng1,lat1],"to":[lng2,lat2],"label":"说明"}}

7. label - 文字标注
   {"id":"label","params":{"lat":纬度,"lng":经度,"text":"文字","color":"#ffffff"}}

洋流路径参考：
- 秘鲁寒流: [[-80,0],[-82,-5],[-82,-10],[-80,-15],[-78,-20],[-76,-25]]
- 墨西哥湾暖流: [[-82,25],[-78,30],[-72,35],[-60,40],[-45,48]]
- 黑潮: [[125,15],[127,20],[130,25],[135,30],[140,35]]

城市坐标：北京[116.4,39.9] 上海[121.5,31.2] 东京[139.7,35.7]`;

      try {
        const response = await fetch(`${API_BASE}/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'openclaw:main',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: question }
            ],
            stream: false
          })
        });
        
        const data = await response.json();
        return data.choices?.[0]?.message?.content || null;
      } catch (e) {
        console.error('API 调用失败:', e);
        return null;
      }
    }
    
    // 发送消息
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMessage(text, 'user');
      
      const thinking = addMessage('🤔 分析中...');
      
      const reply = await callAI(text);
      
      if (reply) {
        thinking.textContent = '';
        
        // 解析 VIZ_JSON
        const hasViz = parseAndRender(reply);
        
        // 显示文字部分（去掉 VIZ_JSON 标签）
        const textOnly = reply.replace(/\[\[VIZ_JSON\]\][\s\S]*?\[\[\/VIZ_JSON\]\]/g, '').trim();
        if (textOnly) {
          addMessage(textOnly);
        }
        
        if (!hasViz) {
          addMessage('（未生成可视化，请尝试更具体的地理题目）');
        }
      } else {
        thinking.textContent = '❌ 连接失败。请确认 API 代理已启动，且 VPS 防火墙开放 3000 端口。';
      }
    }
    
    // 事件绑定
    document.getElementById('send').addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // 初始化
    initScene();
    addMessage('🌍 地理可视化 Agent 已就绪。\n\n输入地理题目，我会自动匹配可视化组件并讲解。\n\n试试：\n• 秘鲁寒流为什么导致渔业减产\n• 亚洲季风气候的成因\n• 喜马拉雅山脉是怎么形成的');
  </script>
</body>
</html>
