<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地理可视化 Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #fff; font-family: -apple-system, sans-serif; }
    #app { display: flex; height: 100vh; }
    #chat { 
      width: 400px; 
      background: #111122; 
      display: flex; 
      flex-direction: column;
      border-right: 1px solid #333;
    }
    #chat-header { 
      padding: 16px; 
      border-bottom: 1px solid #333;
      font-size: 16px;
      color: #4da6ff;
    }
    #chat-messages { 
      flex: 1; 
      overflow-y: auto; 
      padding: 16px;
    }
    .msg { 
      margin: 8px 0; 
      padding: 10px 14px; 
      border-radius: 8px; 
      font-size: 13px; 
      line-height: 1.6;
      max-width: 90%;
    }
    .msg.user { 
      background: #1a3a5c; 
      margin-left: auto;
      border-bottom-right-radius: 2px;
    }
    .msg.ai { 
      background: #1a1a2e; 
      border: 1px solid #333;
      border-bottom-left-radius: 2px;
    }
    .msg pre { 
      background: #0d0d1a; 
      padding: 8px; 
      border-radius: 4px; 
      overflow-x: auto;
      font-size: 11px;
      margin-top: 8px;
    }
    #chat-input {
      padding: 12px 16px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
    }
    #chat-input input {
      flex: 1;
      padding: 10px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
      font-size: 14px;
    }
    #chat-input button {
      padding: 10px 16px;
      background: #4da6ff;
      border: none;
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    #viz-container { flex: 1; position: relative; }
    .viz-label {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: #4da6ff;
    }
    .error-msg { color: #e74c3c; font-size: 11px; margin-top: 4px; }
    #rotate-toggle {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      border: 1px solid #4da6ff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    #rotate-toggle:hover { background: rgba(77,166,255,0.3); }
  </style>
</head>
<body>
  <div id="app">
    <div id="chat">
      <div id="chat-header">🌍 地理可视化 Agent</div>
      <div id="chat-messages"></div>
      <div id="chat-input">
        <input type="text" id="input" placeholder="输入地理题目..." />
        <button id="send">发送</button>
      </div>
    </div>
    <div id="viz-container">
      <div class="viz-label">Three.js 可视化</div>
      <button id="rotate-toggle" onclick="toggleRotation()">⏸ 停止自转</button>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "/vendor/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  
  <script type="module">
    import { SceneManager, Globe, COMPONENT_REGISTRY } from '../index.js';
    
    let scene = null;
    const messages = document.getElementById('chat-messages');
    const input = document.getElementById('input');
    
    // 初始化 Three.js 场景
    function initScene() {
      const container = document.getElementById('viz-container');
      scene = new SceneManager(container, { backgroundColor: 0x000011 });
      const globe = new Globe();
      scene.addComponent(globe, {});
      scene.start();
    }
    
    // 切换地球自转
    let isRotating = true;
    window.toggleRotation = function() {
      isRotating = !isRotating;
      const globe = [...scene.components.values()].find(c => c.metadata?.id === 'globe');
      if (globe) {
        globe.params.rotateSpeed = isRotating ? 0.0005 : 0;
      }
      document.getElementById('rotate-toggle').textContent = isRotating ? '⏸ 停止自转' : '▶ 开始自转';
    };
    
    // 添加消息到聊天
    function addMessage(text, type = 'ai') {
      const div = document.createElement('div');
      div.className = `msg ${type}`;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }
    
    // 解析并渲染 VIZ_JSON
    function parseAndRender(text) {
      const match = text.match(/\[\[VIZ_JSON\]\]([\s\S]*?)\[\[\/VIZ_JSON\]\]/);
      if (!match) return false;
      
      try {
        const data = JSON.parse(match[1]);
        if (data.components) {
          // 清除旧组件
          for (const [id, comp] of [...scene.components]) {
            if (comp.metadata.id !== 'globe') {
              scene.removeComponent(id);
            }
          }
          
          // 加载新组件
          const loaded = scene.loadComponents(data.components, COMPONENT_REGISTRY);
          
          // 显示分析信息
          if (data.analysis) {
            addMessage(`📊 分析：${data.analysis.type} | 要素：${data.analysis.core_elements.join('、')}`);
          }
          addMessage(`✅ 已加载 ${loaded.length} 个可视化组件`);
          
          // 更新可视化标签
          document.querySelector('.viz-label').textContent = 
            data.analysis?.core_elements?.join(' + ') || 'Three.js 可视化';
          
          return true;
        }
      } catch (e) {
        addMessage(`❌ JSON 解析失败: ${e.message}`, 'error-msg');
      }
      return false;
    }
    
    // API 配置
    const API_BASE = window.location.origin;
    
    // 调用 OpenClaw API
    async function callAI(question) {
      // 不设 system prompt，让 OpenClaw agent 自动调用 geo_tutor skill
      // agent 会读取 skill 的 SKILL.md 和 refs/ 知识库
      const systemPrompt = `用户是高中生，问地理题。你必须：
1. 先输出 [[VIZ_JSON]] 标签包裹的可视化 JSON
2. 再输出教师讲解（简洁口语化，不用##符号）

组件：ocean_current(path+type+label), wind(path+strength), arrow(from+to+label), label(lat+lng+text+color), terrain(type+name), climate_zone(type), plate_tectonic(boundary+type+plates)

气候带预设ID（直接用 type 参数）：
amazon_rainforest, congo_rainforest, se_asia_rainforest, sahara_desert, arabian_desert, gobi_desert, mediterranean, indian_monsoon, china_subtropical, europe_oceanic, australia_savanna, north_america_prairie, antarctic_ice, siberia_subarctic

地形预设ID：
tibetan_plateau, himalayas, andes, rockies, brazilian_highlands, east_african_plateau, deccan_plateau, amazon_basin, west_siberian_plain

真实洋流路径（直接使用，不要自己编造）：
秘鲁寒流(南→北,沿南美西海岸):[[-78,-45],[-79,-40],[-78,-35],[-77,-30],[-76,-25],[-76,-20],[-80,-15],[-83,-10],[-86,-5],[-85,-2]]
墨西哥湾暖流:[[-82,25],[-80,28],[-78,30],[-75,33],[-72,36],[-65,40],[-55,44],[-45,48],[-35,52],[-20,56]]
黑潮(日本暖流):[[125,15],[127,18],[130,22],[133,26],[136,30],[140,34],[145,38],[150,42]]
亲潮(千岛寒流):[[155,50],[150,48],[145,45],[140,42],[138,40],[136,38]]
加利福尼亚寒流:[[-125,48],[-124,44],[-122,40],[-120,36],[-118,32],[-116,28],[-114,24]]
本格拉寒流:[[12,-34],[13,-30],[14,-26],[15,-22],[16,-18],[17,-14],[18,-10]]
北大西洋暖流:[[-45,48],[-35,50],[-25,52],[-15,55],[-5,58],[5,60],[15,62]]
西风漂流:[[-180,-55],[-120,-55],[-60,-55],[0,-55],[60,-55],[120,-55]]

真实板块边界：
环太平洋: [[130,30],[135,35],[140,40],[145,45],[150,50],[155,55]]
喜马拉雅: [[70,28],[75,30],[80,30],[85,28],[90,27],[95,26],[100,25]]
大西洋中脊: [[-20,65],[-25,60],[-30,55],[-35,50],[-40,45],[-45,40]]

北京[116.4,39.9] 上海[121.5,31.2]`;

      try {
        const response = await fetch(`${API_BASE}/v1/chat/completions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'openclaw:main',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: question }
            ],
            stream: false
          })
        });
        
        const data = await response.json();
        return data.choices?.[0]?.message?.content || null;
      } catch (e) {
        console.error('API 调用失败:', e);
        return null;
      }
    }
    
    // 发送消息
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      
      input.value = '';
      addMessage(text, 'user');
      
      const thinking = addMessage('🤔 分析中...');
      
      const reply = await callAI(text);
      
      if (reply) {
        thinking.textContent = '';
        
        // 解析 VIZ_JSON
        const hasViz = parseAndRender(reply);
        
        // 显示文字部分（去掉 VIZ_JSON 标签）
        const textOnly = reply.replace(/\[\[VIZ_JSON\]\][\s\S]*?\[\[\/VIZ_JSON\]\]/g, '').trim();
        if (textOnly) {
          addMessage(textOnly);
        }
        
        if (!hasViz) {
          addMessage('（未生成可视化，请尝试更具体的地理题目）');
        }
      } else {
        thinking.textContent = '❌ 连接失败。请确认 API 代理已启动，且 VPS 防火墙开放 3000 端口。';
      }
    }
    
    // 事件绑定
    document.getElementById('send').addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    // 初始化
    initScene();
    addMessage('🌍 地理可视化 Agent 已就绪。\n\n输入地理题目，我会自动匹配可视化组件并讲解。\n\n试试：\n• 秘鲁寒流为什么导致渔业减产\n• 亚洲季风气候的成因\n• 喜马拉雅山脉是怎么形成的');
  </script>
</body>
</html>
